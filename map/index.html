	<script>
		const redMarker = `<svg xmlns="http://www.w3.org/2000/svg" class="size-5 text-orange-500 -translate-x-1 -translate-y-2" viewBox="0 0 24 24"><path fill="currentColor" d="M12 11.5A2.5 2.5 0 0 1 9.5 9A2.5 2.5 0 0 1 12 6.5A2.5 2.5 0 0 1 14.5 9a2.5 2.5 0 0 1-2.5 2.5M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7"/></svg>`;
		const blueMarker = `<svg xmlns="http://www.w3.org/2000/svg" class="size-7 text-sky-700 -translate-x-2 -translate-y-5 hover:scale-120" viewBox="0 0 24 24"><path fill="currentColor" d="M12 11.5A2.5 2.5 0 0 1 9.5 9A2.5 2.5 0 0 1 12 6.5A2.5 2.5 0 0 1 14.5 9a2.5 2.5 0 0 1-2.5 2.5M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7"/></svg>`;

		const paises = [
			'brazil',
			'costa rica',
			'venezuela',
			'mexico',
			'panama',
			'argentina',
			'honduras',
		];
		const map = L.map('map', {
			attributionControl: false,
			zoomSnap: 0.1,
			zoomControl: false,
		}).setView([40, -85], 2.3);

		const geoJsonUrl = '/map/countries.geojson';

		fetch(geoJsonUrl)
			.then((res) => res.json())
			.then((data) => {
				L.geoJSON(data, {
					filter: function (feature) {
						const name = feature.properties.name;
						const continent = feature.properties.continent;
						const isAmerica =
							continent === 'North America' ||
							continent === 'South America';
						const isGreenland = name === 'Greenland';
						return isAmerica && !isGreenland;
					},
					style: function (feature) {
						const name = feature.properties.name;

						// console.log(paises.includes(name.toLowerCase()));
						return {
							fillColor: paises.includes(name.toLowerCase())
								? 'oklch(70.5% 0.213 47.604)'
								: '#aaa', // Gris base
							color: '#ddd', // Línea de frontera sutil blanca (opcional)
							weight: 1,
							fillOpacity: 0.8, // Un poco de transparencia base
						};
					},
					onEachFeature: function (feature, layer) {
						const name = feature.properties.name;
						if (!paises.includes(name.toLowerCase())) return;
						// 1. Mostrar el nombre al pasar el cursor (Tooltip)
						layer.bindTooltip(feature.properties.name, {
							sticky: true, // La etiqueta sigue al cursor
							permanent: false,
							direction: 'top',
							className: 'custom-tooltip', // Clase para estilo CSS
						});

						// 2. Efectos visuales al pasar el cursor
						layer.on({
							mouseover: function (e) {
								const l = e.target;
								l.setStyle({
									// fillColor: '#555555', // Gris más oscuro al pasar el cursor
									fillOpacity: 1,
								});
								l.bringToFront(); // Evita que los bordes se vean mal
							},
							mouseout: function (e) {
								const l = e.target;
								l.setStyle({
									// fillColor: '#aaa', // Vuelve al gris original
									fillOpacity: 0.8,
								});
							},
						});
					},
				}).addTo(map);

				// Ajuste de encuadre para las Américas
				const bounds = L.latLngBounds([
					[-56, -110],
					[75, -35],
				]);
				// map.fitBounds(bounds);
			});

		const companies = [
			// Panamá (Centro)
			{ name: 'Pacific Canal Services', lat: 8.538, lng: -80.7821 },
			{ name: 'Isthmus FinTech', lat: 8.538, lng: -80.7821 },
			{ name: 'Cloud Darién', lat: 8.538, lng: -80.7821 },

			// Colombia
			{ name: 'Coffee Valley Systems', lat: 4.5709, lng: -74.2973 },
			{ name: 'Medellín Innovation Lab', lat: 4.5709, lng: -74.2973 },
			{ name: 'Caribbean Trade Co.', lat: 4.5709, lng: -74.2973 },

			// Venezuela
			{ name: 'Orinoco Energy', lat: 6.4238, lng: -66.5897 },

			// Ecuador
			{ name: 'Equator Software', lat: -1.8312, lng: -78.1834 },

			// Perú
			{ name: 'Inca Digital Assets', lat: -9.19, lng: -75.0152 },
			{ name: 'Andean Mining Tech', lat: -9.19, lng: -75.0152 },

			// Brasil
			{ name: 'Amazonas Data Center', lat: -14.235, lng: -51.9253 },
			{ name: 'Paulista Ventures', lat: -14.235, lng: -51.9253 },

			// Bolivia
			{ name: 'Altiplano Solutions', lat: -16.2902, lng: -63.5887 },

			// Paraguay
			{ name: 'Guaraní Agrotech', lat: -23.4425, lng: -58.4438 },

			// Chile
			{ name: 'Southern Star Mining', lat: -35.6751, lng: -71.543 },

			// Argentina
			{ name: 'Pampa Renewable Energy', lat: -38.4161, lng: -63.6167 },
		];

		const offices = [
			{ name: 'Mexico City Hub', lat: 19.4326, lng: -99.1332 }, // Ciudad de México, MX
			{ name: 'Panama Central Ops', lat: 8.9833, lng: -79.5167 }, // Ciudad de Panamá, PA
			{ name: 'Buenos Aires HQ', lat: -34.6037, lng: -58.3816 }, // Buenos Aires, AR
			{ name: 'San José Logistics', lat: 9.9281, lng: -84.0907 }, // San José, CR
			{ name: 'Tegucigalpa Office', lat: 14.0723, lng: -87.1921 }, // Tegucigalpa, HN
		];

		// Icono personalizado rojo
		const redIcon = L.divIcon({
			html: redMarker,
			className: 'red-marker',
			iconSize: [12, 12],
			iconAnchor: [6, 6],
		});

		// Icono personalizado rojo
		const blueIcon = L.divIcon({
			html: blueMarker,
			className: 'red-marker',
			iconSize: [12, 12],
			iconAnchor: [6, 6],
		});

		// Añadir los marcadores al mapa
		// companies.forEach((company) => {
		// 	const marker = L.marker([company.lat, company.lng], {
		// 		icon: redIcon,
		// 	}).addTo(map);

		// 	// Configurar el Tooltip para la compañía
		// 	marker.bindTooltip(company.name, {
		// 		permanent: false,
		// 		direction: 'top',
		// 		className: 'custom-tooltip', // Reutilizamos el estilo negro que creamos antes
		// 	});

		// 	// Opcional: Efecto al pasar el mouse por el marcador
		// });

		// Añadir los marcadores al mapa
		offices.forEach((company) => {
			const marker = L.marker([company.lat, company.lng], {
				icon: blueIcon,
			}).addTo(map);

			// Configurar el Tooltip para la compañía
			marker.bindTooltip(company.name, {
				permanent: false,
				direction: 'top',
				className: 'custom-tooltip', // Reutilizamos el estilo negro que creamos antes
			});

			// Opcional: Efecto al pasar el mouse por el marcador
		});

		// Definimos el contenido del div
		const labelContent = document.getElementById('map-label');
		// console.log(labelContent);

		// Creamos el icono que contiene el HTML
		const textIcon = L.divIcon({
			className: '', // Nuestra clase CSS
			html: labelContent.innerHTML,
			iconSize: [210, 0], // Tamaño aproximado del recuadro
			iconAnchor: [250, 0], // Centramos el punto de anclaje
		});

		// Lo situamos en una coordenada fija (ejemplo: cerca de la frontera entre Perú y Brasil)
		const textMarker = L.marker([-8.0, -75], {
			icon: textIcon,
			interactive: false, // Para que no interfiera con los clics en el mapa
		}).addTo(map);

		// Creamos el icono que contiene el HTML
		const hawaiiHide = L.divIcon({
			className: 'bg-white', // Nuestra clase CSS
			html: '',
			iconSize: [120, 100], // Tamaño aproximado del recuadro
			iconAnchor: [0, 0], // Centramos el punto de anclaje
		});

		const hawaiiMarker = L.marker([35, -165], {
			icon: hawaiiHide,
			interactive: false, // Para que no interfiera con los clics en el mapa
		}).addTo(map);
